<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Deep Charcoal/Teal Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b131f" />
      <stop offset="100%" stop-color="#040810" />
    </linearGradient>

    <!-- Glowing Vector Gradients -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="emeraldGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Clean Vector Glow Filter -->
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded App Base Container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- The "Lens" Overlay - Representing Clarity -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1e293b" stroke-width="8" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="#334155" stroke-width="4" stroke-dasharray="12 12" />

  <!-- Doctor Pathway Waveform (Cyan - Left to Center) -->
  <path 
    d="M 60 256 L 150 256 L 175 200 L 200 320 L 225 230 L 256 256" 
    fill="none" 
    stroke="url(#cyanGlow)" 
    stroke-width="18" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    filter="url(#neon)"
  />

  <!-- Patient Pathway Waveform (Emerald - Center to Right) -->
  <path 
    d="M 256 256 L 285 256 L 310 160 L 335 340 L 360 220 L 385 256 L 452 256" 
    fill="none" 
    stroke="url(#emeraldGlow)" 
    stroke-width="18" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    filter="url(#neon)"
  />

  <!-- Central Split-Color Core Link -->
  <circle cx="256" cy="256" r="18" fill="#ffffff" filter="url(#neon)" />
</svg>
